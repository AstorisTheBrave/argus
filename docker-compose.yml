# Prometheus + Grafana, fully provisioned. The bot is your own application and
# stays out of compose; point prometheus/prometheus.yml at it (see that file).
#
#   docker compose up -d
#   open http://localhost:3000  (admin / admin)
#
# Images are pinned so the committed dashboards' schemaVersion stays in step
# with the Grafana that renders them.

services:
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: argus-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      # let prometheus reach a bot running on the host as host.docker.internal
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: argus-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  prometheus-data:
  grafana-data:
