name: publish

# Manual fallback for publishing to PyPI (e.g. to retry a failed release run).
# The normal path is automatic: the release-please workflow publishes in the
# same run that creates a release. Uses PyPI Trusted Publishing (OIDC). Node is
# set up so the build hook can compile the dashboard SPA into the wheel.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to build and publish (e.g. v0.2.0)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/argus-dpy
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          attestations: true
