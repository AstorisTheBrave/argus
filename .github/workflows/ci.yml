name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . --group dev
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy
      - name: Tests
        run: pytest --cov=argus --cov-report=term-missing --cov-fail-under=90

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Audit the project's resolved dependency tree for known advisories.
      # Tighten or add ignores here if a transitive advisory has no fix yet.
      - name: pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: .

  config:
    # Verify the shipped operational config the unit tests cannot: the Prometheus
    # rules (syntax + alert behaviour) and the release SBOM commands.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: promtool check + unit-test the rules
        run: |
          img=prom/prometheus:v3.1.0
          docker run --rm -v "$PWD/prometheus:/p" --entrypoint promtool $img check rules /p/rules/argus.rules.yml
          docker run --rm -v "$PWD/prometheus:/p" --entrypoint promtool $img test rules /p/rules/argus.rules.test.yml
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Dry-run the release SBOM commands
        run: |
          python -m pip install --upgrade build cyclonedx-bom
          python -m build --wheel
          python -m venv sbom-venv
          ./sbom-venv/bin/pip install dist/*.whl
          cyclonedx-py environment ./sbom-venv -o argus-sbom.cyclonedx.json
          python -c "import json; d=json.load(open('argus-sbom.cyclonedx.json')); assert d['bomFormat']=='CycloneDX', d"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build reference image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
      - name: Build fleet image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.fleet
          push: false

  clickhouse:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_USER: argus
          CLICKHOUSE_PASSWORD: argus
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --user argus --password argus --query 'SELECT 1'"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      CLICKHOUSE_DSN: http://argus:argus@localhost:8123
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install (with clickhouse extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[clickhouse]" --group dev
      - name: Integration tests
        run: pytest -m integration -v
